  homepage:
  photo:
  location: Singapore
  bio: >-
    Wei Dong is an Assistant Professor at the College of Computing and Data Science, Nanyang Technological University. His research interests include data privacy and security, privacy-preserving AI, and LLM and AI security. His expertise complements the workshop's focus on privacy-preserving deployment of agentic systems.
- name: Chaoyi Ruan
  initials: CR
  affiliation: National University of Singapore
  role: Organizer
  email: chaoyi@nus.edu.sg
  homepage:
  photo:
  location: Singapore
  bio: >-
    Chaoyi Ruan is a postdoctoral researcher at the National University of Singapore, advised by Prof. Jialin Li. His research interests include machine learning systems, agentic systems, and data infrastructure for AI. His work spans LLM infrastructure, distributed LLM serving and training, memory disaggregation, and database/storage systems, with publications at systems, databases, and AI venues including NSDI, VLDB, ASPLOS, FAST, and ICLR.
