  photo:
  location: Wuhan, China
  bio: >-
    Qinbin Li is a Professor at Huazhong University of Science and Technology. His research focuses on distributed and federated machine learning systems. He has been recognized in the Stanford/Elsevier World's Top 2% Scientists list. He is also a recipient of the Google Ph.D. Fellowship, TPDS Best Paper Award, VLDB Best Research Paper Nomination, SIGMOD Best Artifact Award, and PREMIA Best Student Paper Gold Award.
- name: Jialin Li
  initials: JL
  affiliation: National University of Singapore
  role: Organizer
  email: lijl@comp.nus.edu.sg
  homepage:
  photo:
  location: Singapore
  bio: >-
    Jialin Li is an Assistant Professor in the School of Computing at the National University of Singapore. His research focuses on co-designing distributed systems and networks, OS and compiler support for heterogeneous hardware, and AI/ML systems. His work has received Best Paper Awards at systems venues including NSDI and OSDI.
- name: Wei Dong
  initials: WD
  affiliation: Nanyang Technological University
  role: Organizer
